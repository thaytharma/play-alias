name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  # On master, once tests pass, tell thay-web to rebuild + redeploy the site
  # (which pulls this repo, builds it, and publishes it under /alias).
  trigger-deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger thay-web deploy
        env:
          DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "DEPLOY_DISPATCH_TOKEN not set — skipping deploy trigger."
            echo "Add the secret to auto-deploy thay-web when alias changes."
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: token $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/thaytharma/thay-web/dispatches \
            -d '{"event_type":"alias-updated"}'
          echo "Triggered thay-web deploy."
