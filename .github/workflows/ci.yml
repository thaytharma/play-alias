name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  # On master, once tests pass, tell thay-web to rebuild + redeploy the site
  # (which pulls this repo, builds it, and publishes it under /alias).
  trigger-deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger thay-web deploy
        env:
          DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::warning title=Not deployed::DEPLOY_DISPATCH_TOKEN is not set, so thay-web was NOT deployed. Add the secret (Settings → Secrets and variables → Actions) to enable auto-deploy."
            exit 0
          fi
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/thaytharma/thay-web/dispatches \
            -d '{"event_type":"alias-updated"}')
          if [ "$status" = "204" ]; then
            echo "Triggered thay-web deploy."
          else
            echo "::error title=Deploy trigger failed::Dispatch returned HTTP $status. Check DEPLOY_DISPATCH_TOKEN has 'Contents: Read and write' on thaytharma/thay-web."
            exit 1
          fi
